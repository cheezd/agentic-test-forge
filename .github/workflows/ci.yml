name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest --cov=agentic_test_forge --cov-report=term-missing

      - name: CLI smoke test
        run: forge --help

  forge-check:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and run tests with coverage
        run: |
          pip install -e ".[dev]"
          pytest --cov=agentic_test_forge --cov-report=term-missing

      - name: Install forge from PyPI
        run: pip install agentic-test-forge==1.0.0

      - name: Run forge quality gate
        run: forge check --path src/agentic_test_forge --json forge-report.json

      - name: Upload forge report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-report
          path: forge-report.json

  forge-mutate-pilot:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install forge and pilot harness
        run: |
          pip install -e ".[dev]"
          pip install -e "./pilot[dev]"

      - name: Run code mutation gate on pilot
        working-directory: pilot
        run: |
          pytest --cov=src/pilot_app tests/ -q
          forge mutate --path src/pilot_app --full --threshold 80 --json ../forge-mutation-pilot-report.json

      - name: Upload mutation report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: forge-mutation-pilot-report
          path: forge-mutation-pilot-report.json

  forge-mutate-gherkin-pilot:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install forge and pilot harness
        run: |
          pip install -e ".[dev]"
          pip install -e "./pilot[dev]"

      - name: Run Gherkin mutation gate on pilot
        working-directory: pilot
        run: |
          python -m behave features/
          forge mutate-gherkin --path features --full --threshold 80 --json ../forge-gherkin-pilot-report.json

      - name: Upload Gherkin mutation report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: forge-gherkin-pilot-report
          path: forge-gherkin-pilot-report.json
