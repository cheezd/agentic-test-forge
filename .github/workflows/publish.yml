# Publish agentic-test-forge to PyPI and create a GitHub Release.
#
# One-time setup (maintainer):
# 1. Register https://pypi.org/project/agentic-test-forge/ (verify name at registration).
# 2. PyPI → Your project → Publishing → Add a new pending publisher:
#    - Owner: cheezd
#    - Repository: agentic-test-forge
#    - Workflow: publish.yml
#    - Environment: pypi
# 3. GitHub → Settings → Environments → create "pypi" (optional protection rules).
#
# Fallback: set PYPI_API_TOKEN repo secret and uncomment the password line below
# (not recommended when Trusted Publishing is available).

name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi

      - name: Install hatch
        run: pip install hatch

      - name: Build distributions
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
